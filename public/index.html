<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kafka API Test</title>
</head>
<body style="font-family: Arial, sans-serif; margin: 24px;">
  <h1>Kafka API Frontend Test</h1>
  <p>Send messages, read latest, view analytics, and real-time stream.</p>

  <div>
    <label>Topic: <input id="topic" value="test-topic" /></label>
  </div>
  <div>
    <label>Message JSON: <textarea id="payload" rows="4" cols="50">{"text":"hello world"}</textarea></label>
  </div>
  <button id="send">Send Message</button>
  <button id="read">Read Latest</button>
  <button id="analytics">Get Analytics</button>
  <button id="start-stream">Start Stream</button>

  <h3>Status</h3>
  <pre id="status" style="background:#f3f3f3; padding:10px; border:1px solid #ddd; min-height:70px;"></pre>

  <h3>Live Stream</h3>
  <pre id="stream" style="background:#eef; padding:10px; border:1px solid #99c; min-height:80px;"></pre>

  <script>
    const API_BASE = 'http://localhost:4000';
    const status = document.getElementById('status');
    const streamEl = document.getElementById('stream');
    const topicInput = document.getElementById('topic');
    const payloadInput = document.getElementById('payload');

    document.getElementById('send').addEventListener('click', async () => {
      const topic = topicInput.value.trim() || 'test-topic';
      let payload;
      try {
        payload = JSON.parse(payloadInput.value);
      } catch (e) {
        status.textContent = 'Invalid JSON payload: ' + e.message;
        return;
      }
      status.textContent = 'Sending...';
      try {
        const res = await fetch(`${API_BASE}/api/messages`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic, payload }),
        });
        const json = await res.json();
        status.textContent = `POST ${API_BASE}/api/messages -> ${res.status}\n${JSON.stringify(json, null, 2)}`;
      } catch (err) {
        status.textContent = 'Send failed: ' + err;
      }
    });

    document.getElementById('read').addEventListener('click', async () => {
      const topic = topicInput.value.trim() || 'test-topic';
      status.textContent = 'Reading...';
      try {
        const res = await fetch(`${API_BASE}/api/messages/latest?topic=${encodeURIComponent(topic)}&limit=20`);
        const json = await res.json();
        status.textContent = `GET ${API_BASE}/api/messages/latest -> ${res.status}\n${JSON.stringify(json, null, 2)}`;
      } catch (err) {
        status.textContent = 'Read failed: ' + err;
      }
    });

    document.getElementById('analytics').addEventListener('click', async () => {
      const topic = topicInput.value.trim() || 'test-topic';
      status.textContent = 'Analytics...';
      try {
        const res = await fetch(`${API_BASE}/api/analytics?topic=${encodeURIComponent(topic)}`);
        const json = await res.json();
        status.textContent = `GET ${API_BASE}/api/analytics -> ${res.status}\n${JSON.stringify(json, null, 2)}`;
      } catch (err) {
        status.textContent = 'Analytics failed: ' + err;
      }
    });

    document.getElementById('start-stream').addEventListener('click', () => {
      const topic = topicInput.value.trim() || 'test-topic';
      streamEl.textContent = 'Connecting to SSE...';
      const evtSource = new EventSource(`${API_BASE}/api/stream?topic=${encodeURIComponent(topic)}`);
      evtSource.onmessage = (e) => {
        const data = JSON.parse(e.data);
        streamEl.textContent += `\n${new Date().toLocaleTimeString()}: ${JSON.stringify(data)}`;
      };
      evtSource.onerror = () => {
        streamEl.textContent += '\n[stream error]';
      };
    });
  </script>
</body>
</html>
